<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💰 Finance AI V12</title>
<link rel="manifest" href="manifest.json">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial; padding: 10px; background: #f5f5f5; }
h2 { text-align: center; }
input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; }
.section { background: #fff; padding: 10px; margin-top: 10px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
.alert { color: red; font-weight: bold; white-space: pre-line; }
.good { color: green; }
.table { width: 100%; border-collapse: collapse; margin-top: 10px; }
.table th, .table td { border: 1px solid #ccc; padding: 8px; text-align: left; }
.table th { background: #f0f0f0; }
</style>
</head>
<body>

<h2>💰 Finance AI V12</h2>

<div class="section">
<h3>➕ Операция</h3>
<input id="amount" type="number" placeholder="Сумма" min="0">
<select id="type">
  <option value="income">Доход</option>
  <option value="expense">Расход</option>
</select>
<input id="note" placeholder="Например: coffee, fuel, kaspi">
<button onclick="add()">Добавить</button>
</div>

<div class="section">
<h3>🎯 Лимиты</h3>
<input id="limitCategory" placeholder="Категория">
<input id="limitAmount" type="number" placeholder="Лимит" min="0">
<button onclick="addLimit()">Добавить лимит</button>
<div id="limits"></div>
</div>

<div class="section">
<h3>📊 Итоги</h3>
<div id="balance"></div>
<div id="capital" class="good"></div>
<div id="forecast"></div>
<div id="alerts" class="alert"></div>
</div>

<div class="section">
<h3>📈 Аналитика</h3>
<canvas id="chart"></canvas>
</div>

<div class="section">
<h3>📝 История транзакций</h3>
<table class="table" id="transactionTable">
  <thead>
    <tr>
      <th>Сумма</th>
      <th>Тип</th>
      <th>Категория</th>
      <th>Действия</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>
</div>

<script type="module">
// Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
import { getFirestore } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

  apiKey: "AIzaSyD_HHVUbP3Y723vI3-iFN4w01o2ra9MT9U",
  authDomain: "financeai-b21e0.firebaseapp.com",
  projectId: "financeai-b21e0",
  storageBucket: "financeai-b21e0.firebasestorage.app",
  messagingSenderId: "427897728846",
  appId: "1:427897728846:web:b37614042446064fb7381f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
</script>

<script src="app.js"></script>

</body>
</html>
